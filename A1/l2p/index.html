        <script type="text/javascript">
            daty = []
            wydarzenia = []
            qindex = 0;
            
            function shuffle(array, array2) {
                var counter = array.length, temp, temp2, index;

                while (counter > 0) {
                    index = Math.floor(Math.random() * counter);

                    counter--;

                    temp = array[counter];
                    temp2 = array2[counter];

                    array[counter] = array[index];
                    array2[counter] = array2[index];

                    array[index] = temp;
                    array2[index] = temp2;
                }
            }
            
            function add(wydarzenie, data)
            {
                daty.push(data);
                wydarzenia.push(wydarzenie);
            }
            
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            function nextQuestion()
            {
                qindex += 1
                if(qindex == wydarzenia.length)
                {
                    shuffle(wydarzenia, daty);
                    qindex = 0;
                }   
                document.getElementById("question").innerHTML = wydarzenia[qindex];
            }

            }
            
            window.onkeyup = async function(e) {
                var key = e.keyCode ? e.keyCode : e.which;
                
                inner = document.getElementById("text").innerHTML;
                
                console.log(key);
                
                clicked = false;
                
                if(key >= 48 && key <= 57 && inner.length < daty[qindex].length + 1)
                {
                    document.getElementById("text").innerHTML = inner.replace("_", String.fromCharCode(key));
                    clicked = true;
                }
                else if(key == 8 && inner.length != 0)
                {
                    document.getElementById("text").innerHTML = inner.replace("_", "");
                    inner = document.getElementById("text").innerHTML;
                    document.getElementById("text").innerHTML = inner.substr(0, inner.length-1);
                    clicked = true;
                }
                else if(key == 13)
                {
                    if(document.getElementById("text").innerHTML == daty[qindex])
                    {
                        document.getElementById("text").style.color = "darkseagreen";
                        await sleep(500);
                        document.getElementById("text").style.color = "whitesmoke";
                        document.getElementById("text").innerHTML = "";
                        nextQuestion();
                    }
                    else {
                        document.getElementById("text").style.color = "indianred";
                        await sleep(500);
                        document.getElementById("text").style.color = "whitesmoke"; 
                    }
                    clicked = true;
                }
                
                if(document.getElementById("text").innerHTML.length < daty[qindex].length && clicked)
                {
                    document.getElementById("text").innerHTML += "_";       
                }
            }
        </script>

    <body onload="load()">
