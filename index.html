<!doctype html>
<html>

<head>
  <title>Rainbow Emu Hunters</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8">
  <script>
  //INIT SCRIPT
  window.onload = function() {
    home = `<div class="header">
      <h1>Rainbow Emu Hunters</h1>
    </div>
    <div class="box">
    <div class="inbox">
      <h1 class="center">Welcome on our site!</h1>
      <br>
      <br>
      <h3 class="center">What you can find here?:</h3>
      <div class="listInbox">
        <li>List of team members</li>
        <li>Information about us</li>
        <li>How to contact us</li>
        <li>Our last big play</li>
      </div>
      <br>
      <br>
    </div>
    </div>`;

    team = `<div class="box">
    <div class="inboxMembers">
      <h1 class="center">Team Members</h1>
      <h4>
        <li>
        <div class="member">
        <img src="assets/golzeb.jpg"></img>
        <span>D. 'Golzeb' Z.</span>
        <span>(Founder)</span>
        </div>
        </li>
        <li>
        <div class="member">
        <img src="assets/gamu.jpg"></img>
        <span>J. 'GAMU' K.</span>
        <span>(Co-Founder)</span>
        </div>
        </li>
        <li>
        <div class="member">
        <img src="assets/limas.jpg"></img>
        <span>D. 'LimaSxD' N.</span>
        <span>(Member)</span>
        </div>
        </li>
        <li>
        <div class="member">
        <img src="assets/into.jpg"></img>
        <span>S. 'Intothenether' K.</span>
        <span>(Member)</span>
        </div>
        </li>
        <li>
        <div class="member">
        <img src="assets/heelto.jpg"></img>
        <span>B. 'Heelto' S.</span>
        <span>(Sub)</span>
        </div>
        </li>
        </h4>
      </div>
      </div>`;

    aboutus = `
    <div class="box">
    <div class="inbox">
      <h1 class="center">About us</h1>
      <h4 class="center">Rainbow Emu Hunters is a team which was founded in 24th July 2015. <br>
        The main reason for making this team was to have fun. <br>
        The games we play are: League of Legends, Counter-Strike: Global Offensive, Minecraft, SMITE. <br>
        We were present at FaceIt Challenge for 5v5 Summoner's Rift and lost in Quarter-Finals. <br>
        Now we are having a break in the competetive arena.
      </h4>
    </div>
    </div>`;

    contact = `<div class="box">
    <div class="inbox">
      <h1 class="center">Contact</h1>
      <h3 class="center">You can contact us here:</h3>
      <div class="listInbox">
        <li>rainbowemuhunters@gmail.com</li>
      </div>
      <br>
      <br>
    </div>
    </div>`;

    arrays = [];
    objects = document.getElementsByClassName("menuOptionContent");
    box = document.getElementsByClassName("more")[0];
    audio = document.getElementsByClassName("audio")[0];
    audio.volume = 0.2;
    audio.loop = true;
    audio.play();
    objects[0].id = "active";
    for(var i = 0; i < objects.length; i++) {
      if(i == 0) {
        objects[i].id = "active";
        arrays.push(objects[i].innerHTML);
        objects[i].innerHTML = objects[i].innerHTML + " → ";
      }
      else {
        objects[i].id = "notactive";
        arrays.push(objects[i].innerHTML);
      }
    }
  }
  </script>

</head>

<body>
<div class="player">
<span>◄ Hover here ►</span>
<audio class="audio" src="assets/music.mp3" controls></audio>
</div>

  <div class="menu">
    <div class="menuOption"><a id="active" onclick="menuClick(this)" class="menuOptionContent" href="#home">Home</a></div>
    <div class="menuOption"><a id="notactive" onclick="menuClick(this)" class="menuOptionContent" href="#team">Team</a></div>
    <div class="menuOption"><a id="notactive" onclick="menuClick(this)" class="menuOptionContent" href="#about">About Us</a></div>
    <div class="menuOption"><a id="notactive" onclick="menuClick(this)" class="menuOptionContent" href="#contact">Contact</a></div>
  </div>

  <div class="more">
  <div class="header">
      <h1>Rainbow Emu Hunters</h1>
  </div>

  <div class="box">
    <div class="inbox">
      <h1 class="center">Welcome on our site!</h1>
      <br>
      <br>
      <h3 class="center">What you can find here?:</h3>
      <div class="listInbox">
        <li>List of team members</li>
        <li>Information about us</li>
        <li>How to contact us</li>
        <li>Our last big play</li>
      </div>
      <br>
      <br>
    </div>
  </div>
  </div>

    <script>
    function menuClick(object) {
        for(var i = 0; i < objects.length; i++) {
          if(objects[i] != object) {
            objects[i].innerHTML = arrays[i];
            objects[i].id = "notactive";
          } else if (object.id != "active"){
            object.innerHTML = objects[i].innerHTML + " → ";
            object.id = "active";
            if(i == 0) {
              box.innerHTML = home;
            }
            else if(i == 1) {
              box.innerHTML = team;
            }
            else if(i == 2) {
              box.innerHTML = aboutus;
            }
            else if(i == 3) {
              box.innerHTML = contact;
            }
          }
        }

    }
    </script>

</body>

</html>
